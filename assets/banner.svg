<svg viewBox="0 0 1200 360" width="1200" height="360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="55%" stop-color="#101a33"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#e08a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c451" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5c451" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="keyMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="50%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#b9782a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bgGrad)"/>

  <circle cx="980" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="1080" cy="260" r="180" fill="url(#tealGlow)"/>

  <!-- circuit-like grid lines evoking software/license infrastructure -->
  <g stroke="#3a4a6b" stroke-width="1.2" opacity="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <path d="M780 0 L780 40 L850 40 L850 100" fill="none"/>
    <path d="M900 0 L900 60 L960 60 L960 140" fill="none"/>
    <path d="M700 360 L700 320 L760 320 L760 260" fill="none"/>
    <path d="M1000 360 L1000 300 L1060 300 L1060 220" fill="none"/>
  </g>
  <g fill="#3a4a6b" opacity="0.6">
    <circle cx="850" cy="100" r="4"/>
    <circle cx="960" cy="140" r="4"/>
    <circle cx="760" cy="260" r="4"/>
    <circle cx="1060" cy="220" r="4"/>
  </g>

  <!-- stylized license key silhouette on right -->
  <g transform="translate(870,150) rotate(-18)">
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#keyMetal)" stroke-width="16"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#0a0f1e" stroke-width="4"/>
    <rect x="46" y="-8" width="150" height="16" fill="url(#keyMetal)"/>
    <rect x="150" y="8" width="16" height="26" fill="url(#keyMetal)"/>
    <rect x="178" y="8" width="16" height="34" fill="url(#keyMetal)"/>
  </g>

  <!-- lock accent, unlocked, symbolizing "full access" -->
  <g transform="translate(1030,90)" opacity="0.9">
    <path d="M-30 10 a30 30 0 0 1 60 0 v10" fill="none" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round"/>
    <rect x="-40" y="20" width="80" height="60" rx="8" fill="#101a33" stroke="#2dd4bf" stroke-width="4"/>
    <circle cx="0" cy="50" r="7" fill="#2dd4bf"/>
  </g>

  <!-- decorative thin diagonal accent line -->
  <line x1="0" y1="360" x2="700" y2="0" stroke="#f5c451" stroke-width="1" opacity="0.12"/>
  <line x1="60" y1="360" x2="760" y2="0" stroke="#2dd4bf" stroke-width="1" opacity="0.10"/>

  <!-- headline -->
  <text x="60" y="150" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="64" fill="#f4f6fb">
    <tspan x="60" y="150" textLength="1080.0" lengthAdjust="spacingAndGlyphs" font-size="60.1">Basecamp Business Full Access</tspan>
    <tspan x="60" y="222" fill="url(#goldGrad)" textLength="320" lengthAdjust="spacingAndGlyphs">+ Product</tspan>
  </text>

  <!-- tagline -->
  <text x="60" y="268" font-family="'Segoe UI', Arial, sans-serif" fill="#9fb0d1" textLength="1080.0" lengthAdjust="spacingAndGlyphs" font-size="21.2">
    Enables pluggable full-access license patching for the Basecamp Business ecosystem
  </text>

  <!-- small key icon accent near tagline -->
  <g transform="translate(60,300)" opacity="0.85">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#f5c451" stroke-width="3"/>
    <rect x="9" y="-2" width="26" height="4" fill="#f5c451"/>
    <rect x="28" y="2" width="4" height="6" fill="#f5c451"/>
  </g>
</svg>